# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "aarch64-apple-darwin",
    "x86_64-unknown-linux-gnu",
]

# -- Advisories --------------------------------------------------------
[advisories]
ignore = [
    # Transitive deps from model2vec-rs — unmaintained but no security issue
    { id = "RUSTSEC-2024-0436", reason = "paste is a transitive dep via tokenizers/parquet, no replacement available" },
    { id = "RUSTSEC-2025-0119", reason = "number_prefix is a transitive dep via indicatif/model2vec-rs" },
]

# -- Licenses ----------------------------------------------------------
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-3.0",
    "BSL-1.0",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = [
    # model2vec-rs has no license field in its Cargo.toml manifest
    { allow = ["MIT"], crate = "model2vec-rs" },
]

# -- Bans --------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"

# -- Sources -----------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
