# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "aarch64-apple-darwin",
    "x86_64-unknown-linux-gnu",
]

# -- Advisories --------------------------------------------------------
[advisories]
ignore = [
    # Transitive deps from model2vec-rs — unmaintained but no security issue
    { id = "RUSTSEC-2024-0436", reason = "paste is a transitive dep via tokenizers/parquet, no replacement available" },
    { id = "RUSTSEC-2025-0119", reason = "number_prefix is a transitive dep via indicatif/model2vec-rs" },
    # Transitive deps from lancedb — unmaintained but no security issue
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.x is unmaintained; pulled in transitively via lance for legacy serialization" },
    { id = "RUSTSEC-2021-0153", reason = "encoding is unmaintained; pulled in via lance-tokenizer → lindera dictionaries (CJK encodings)" },
    # Transitive dep from tabled — unmaintained but compile-time only (proc-macro)
    { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2 is unmaintained as of 2026; pulled in transitively via tabled → tabled_derive; compile-time only, no runtime impact. Revisit when tabled drops the dependency." },
]

# -- Licenses ----------------------------------------------------------
[licenses]
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-3.0",
    "BSL-1.0",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    # CC0 is a public-domain dedication, used by lindera dictionary index
    # crates (encoding-index-japanese / -korean / -simpchinese / -singlebyte
    # / -tradchinese) that are pulled in transitively via
    # lancedb → lance → lance-tokenizer → lindera.
    "CC0-1.0",
]
confidence-threshold = 0.8
exceptions = [
    # model2vec-rs has no license field in its Cargo.toml manifest
    { allow = ["MIT"], crate = "model2vec-rs" },
]

# -- Bans --------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
# Allow path-based deps inside the workspace to "look like" wildcards
# (path deps have no version requirement). Without this, our internal
# `tomljson = { path = "../tomljson" }` trips the wildcards rule.
allow-wildcard-paths = true

# -- Sources -----------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
