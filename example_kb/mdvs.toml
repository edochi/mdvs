max = 10000

[[fields.field]]
name = "sensor_type"
type = "String"
allowed = ["projects/alpha/notes/**"]
required = ["projects/alpha/notes/**"]
nullable = false

[[fields.field]]
name = "specialization"
type = "String"
allowed = ["people/*"]
required = []
nullable = false

[[fields.field]]
name = "status"
type = "String"
allowed = ["blog/**", "projects/alpha/*", "projects/alpha/notes/**", "projects/archived/**", "projects/beta/*", "projects/beta/notes/**"]
required = ["blog/**", "projects/alpha/notes/**", "projects/archived/**"]
nullable = false

[fields.field.constraints]
