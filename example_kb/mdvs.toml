required = ["blog/**", "meetings/**", "people/**", "projects/**", "reference/protocols/**"]
nullable = false

[[fields.field]]
name = "unit_id"
type = "String"
allowed = ["people/*"]
required = []
nullable = false

[[fields.field]]
name = "version"
type = "String"
allowed = ["reference/protocols/**"]
required = ["reference/protocols/**"]
nullable = false

[fields.field.constraints]
pattern = '^\d+\.\d+$'

[[fields.field]]
name = "wavelength_nm"
type = "Float"
allowed = ["projects/alpha/notes/**"]
required = ["projects/alpha/notes/**"]
nullable = false
preprocess = ["widen-int-to-float"]

[fields.field.constraints]
