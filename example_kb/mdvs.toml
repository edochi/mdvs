# Override the default output format here. When unset, mdvs picks `pretty`
# for an interactive terminal and `markdown` when stdout is piped. The
# `--output` / `-o` flag always wins.
# default_output_format = "markdown"

[scan]
glob = "**"
include_bare_files = true
skip_gitignore = false
frontmatter_format = "auto"

[check]
auto_update = true

[embedding_model]
provider = "model2vec"
name = "minishlab/potion-base-8M"

[chunking]
max_chunk_size = 1024

[build]
auto_update = true

[search]
default_limit = 10
auto_update = true
auto_build = true

[fields]
ignore = []

[[fields.field]]
name = "action_items"
type = "Array(String)"
allowed = ["meetings/**", "projects/alpha/meetings/**", "projects/beta/meetings/**"]
required = ["meetings/all-hands/**", "projects/alpha/meetings/**", "projects/beta/meetings/**"]
nullable = false

[[fields.field]]
name = "algorithm"
type = "String"
allowed = ["projects/beta/notes/**"]
required = ["projects/beta/notes/**"]
nullable = false

[[fields.field]]
name = "ambient_humidity"
type = "Float"
allowed = ["projects/alpha/notes/**"]
required = []
nullable = false

[[fields.field]]
name = "approved_by"
type = "String"
allowed = ["reference/protocols/**"]
required = ["reference/protocols/**"]
nullable = false

[[fields.field]]
name = "attendees"
type = "Array(String)"
allowed = ["meetings/**", "projects/alpha/meetings/**", "projects/beta/meetings/**"]
required = ["meetings/**", "projects/alpha/meetings/**", "projects/beta/meetings/**"]
nullable = false

[fields.field.constraints]
categories = ["Chiara Russo", "Giulia Ferretti", "Marco Bianchi", "REMO", "Sara Dell'Acqua"]

[[fields.field]]
name = "author"
type = "String"
allowed = ["blog/**", "projects/alpha/*", "projects/alpha/notes/**", "projects/archived/**", "projects/beta/*", "projects/beta/notes/**"]
required = ["blog/**", "projects/alpha/notes/**", "projects/archived/**", "projects/beta/notes/**"]
nullable = false

[fields.field.constraints]
categories = ["Chiara Russo", "Giulia Ferretti", "Marco Bianchi", "REMO", "Sara Dell'Acqua"]

[[fields.field]]
name = "author's_note"
type = "String"
allowed = ["people/*", "projects/alpha/notes/**", "projects/archived/**"]
required = []
nullable = false

[[fields.field]]
name = "batch"
type = "String"
allowed = ["projects/alpha/notes/**", "projects/beta/notes/**"]
required = ["projects/alpha/notes/**", "projects/beta/notes/**"]
nullable = false
preprocess = ["coerce-to-string"]

[[fields.field]]
name = "calibration.adjusted.intensity"
type = "Float"
allowed = ["projects/alpha/notes/**"]
required = []
nullable = false

[[fields.field]]
name = "calibration.adjusted.wavelength"
type = "Float"
allowed = ["projects/alpha/notes/**"]
required = []
nullable = false

[[fields.field]]
name = "calibration.baseline.intensity"
type = "Float"
allowed = ["projects/alpha/notes/**"]
required = []
nullable = false
preprocess = ["widen-int-to-float"]

[[fields.field]]
name = "calibration.baseline.notes"
type = "String"
allowed = ["projects/alpha/notes/**"]
required = []
nullable = false

[[fields.field]]
name = "calibration.baseline.wavelength"
type = "Float"
allowed = ["projects/alpha/notes/**"]
required = []
nullable = false
preprocess = ["widen-int-to-float"]

[[fields.field]]
name = "commission_date"
type = "Date"
allowed = ["people/*"]
required = []
nullable = false

[[fields.field]]
name = "convergence_ms"
type = "Integer"
allowed = ["projects/beta/notes/**"]
required = []
nullable = false

[[fields.field]]
name = "dataset"
type = "String"
allowed = ["projects/beta/notes/**"]
required = ["projects/beta/notes/**"]
nullable = false

[[fields.field]]
name = "date"
type = "Date"
allowed = ["blog/published/**", "meetings/**", "projects/alpha/meetings/**", "projects/archived/**", "projects/beta/meetings/**"]
required = ["blog/published/**", "meetings/**", "projects/alpha/meetings/**", "projects/beta/meetings/**"]
nullable = false

[[fields.field]]
name = "draft"
type = "Boolean"
allowed = ["blog/**"]
required = ["blog/**"]
nullable = false

[[fields.field]]
name = "drift_rate"
type = "Float"
allowed = ["projects/alpha/notes/**"]
required = ["projects/alpha/notes/**"]
nullable = true

[[fields.field]]
name = "duration_minutes"
type = "Integer"
allowed = ["meetings/**", "projects/alpha/meetings/**", "projects/beta/meetings/**"]
required = ["meetings/**", "projects/alpha/meetings/**", "projects/beta/meetings/**"]
nullable = false

[[fields.field]]
name = "email"
type = "String"
allowed = ["people/**"]
required = ["people/interns/**"]
nullable = false

[fields.field.constraints]
pattern = '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$'

[[fields.field]]
name = "equipment_id"
type = "String"
allowed = ["reference/protocols/equipment/**"]
required = ["reference/protocols/equipment/**"]
nullable = false

[fields.field.constraints]
pattern = '^[A-Z]+-\d+[A-Z]?$'

[[fields.field]]
name = "firmware_version"
type = "String"
allowed = ["people/*", "reference/protocols/equipment/*"]
required = []
nullable = false

[fields.field.constraints]
min_length = 5
max_length = 11
pattern = '^\d+\.\d+\.\d+$'

[[fields.field]]
name = "funding"
type = "String"
allowed = ["projects/alpha/notes/**", "projects/archived/**", "projects/beta/notes/**"]
required = ["projects/alpha/notes/**", "projects/archived/**", "projects/beta/notes/**"]
nullable = false
preprocess = ["coerce-to-string"]

[fields.field.constraints]
categories = ['["internal"]', "internal"]

[[fields.field]]
name = "joined"
type = "Date"
allowed = ["people/**"]
required = ["people/**"]
nullable = false

[[fields.field]]
name = "lab section"
type = "String"
allowed = ["people/*"]
required = []
nullable = false

[[fields.field]]
name = "last_reviewed"
type = "Date"
allowed = ["reference/protocols/**"]
required = ["reference/protocols/**"]
nullable = false

[[fields.field]]
name = "measurement_timestamps"
type = "Array(String)"
allowed = ["projects/alpha/notes/**"]
required = []
nullable = false

[[fields.field]]
name = "measurement_values"
type = "Array(Float)"
allowed = ["projects/alpha/notes/**"]
required = []
nullable = false

[[fields.field]]
name = 'notes"v2"'
type = "Boolean"
allowed = ["projects/beta/notes/**"]
required = []
nullable = false

[[fields.field]]
name = "observation_notes"
type = "String"
allowed = ["projects/alpha/notes/**"]
required = []
nullable = false

[[fields.field]]
name = "priority"
