name: Version Bump

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Release level"
        required: true
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      pre:
        description: "Pre-release label (e.g., rc, beta) — leave empty for stable"
        required: false
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cocogitto
        run: |
          curl -sSL https://github.com/cocogitto/cocogitto/releases/download/7.0.0/cocogitto-7.0.0-x86_64-unknown-linux-musl.tar.gz | tar xz --strip-components=1 -C /usr/local/bin

      - name: Configure git
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@mdvs"

      - name: Bump version
        run: |
          ARGS="--${{ inputs.level }}"
          if [ -n "${{ inputs.pre }}" ]; then
            ARGS="$ARGS --pre ${{ inputs.pre }}"
          fi
          echo "Running: cog bump $ARGS"
          cog bump $ARGS

      - name: Publish tomljson to crates.io (skip if already published)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          VERSION=$(grep -E '^version = "[^"]+"' crates/tomljson/Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/tomljson/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "tomljson $VERSION already on crates.io, skipping"
          else
            echo "Publishing tomljson $VERSION"
            cargo publish -p tomljson --no-verify
          fi

      - name: Publish mdvs to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mdvs --no-verify
