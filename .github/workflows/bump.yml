name: Version Bump

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Release level"
        required: true
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      pre:
        description: "Pre-release label (e.g., rc, beta) — leave empty for stable"
        required: false
        type: string

# Atomicity model (best-effort; full 2PC across crates.io + git is not
# achievable since `cargo publish` is irreversible once it succeeds):
#
#   1. cog bump      → updates Cargo.toml, generates commit + tag LOCALLY only
#                      (post_bump_hooks in cog.toml is intentionally empty)
#   2. publish steps → cargo publish for tomljson then mdvs, both idempotent
#                      (treat "already exists" as success — re-runs are safe)
#   3. push          → git push origin commit + tag, retried on transient failure
#
# If step 2 fails: nothing is pushed. The local commit/tag dies with the
# runner. `origin/main` and the release workflow remain at the previous
# state. Re-running this workflow will re-attempt cleanly.
#
# If step 3 fails after step 2 succeeded: the publish window cannot be
# unwound, but the workflow surfaces a loud failure with manual recovery
# instructions. Re-running this workflow will re-attempt the push; the
# publishes will skip via the idempotent guards.

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cocogitto
        run: |
          curl -sSL https://github.com/cocogitto/cocogitto/releases/download/7.0.0/cocogitto-7.0.0-x86_64-unknown-linux-musl.tar.gz | tar xz --strip-components=1 -C /usr/local/bin

      - name: Configure git
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@mdvs"

      - name: Bump version (local commit + tag, no push)
        id: bump
        run: |
          ARGS="--${{ inputs.level }}"
          if [ -n "${{ inputs.pre }}" ]; then
            ARGS="$ARGS --pre ${{ inputs.pre }}"
          fi
          echo "Running: cog bump $ARGS"
          cog bump $ARGS

          # Capture the tag cog just created so the final push step uses it.
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Local bump complete: $TAG"

      - name: Publish tomljson to crates.io (idempotent)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          output=$(cargo publish -p tomljson --no-verify 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [ $exit_code -eq 0 ]; then
            echo "✓ tomljson published"
          elif echo "$output" | grep -q "already exists on crates.io index"; then
            echo "✓ tomljson version already on crates.io — skipping"
          else
            exit $exit_code
          fi

      - name: Publish mdvs to crates.io (idempotent)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          output=$(cargo publish -p mdvs --no-verify 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [ $exit_code -eq 0 ]; then
            echo "✓ mdvs published"
          elif echo "$output" | grep -q "already exists on crates.io index"; then
            echo "✓ mdvs version already on crates.io — skipping"
          else
            exit $exit_code
          fi

      - name: Push commit + tag to origin (with retries)
        id: push
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          MAX_ATTEMPTS=3

          push_with_retry() {
            local target="$1"
            for attempt in $(seq 1 $MAX_ATTEMPTS); do
              if git push origin "$target"; then
                echo "✓ pushed $target (attempt $attempt)"
                return 0
              fi
              if [ $attempt -lt $MAX_ATTEMPTS ]; then
                echo "Push of $target failed (attempt $attempt/$MAX_ATTEMPTS), retrying in 5s..."
                sleep 5
              fi
            done
            echo "✗ push of $target failed after $MAX_ATTEMPTS attempts"
            return 1
          }

          push_with_retry HEAD
          push_with_retry "$TAG"

      - name: Report on push failure after successful publish
        if: failure() && steps.push.outcome == 'failure'
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          {
            echo "## ⚠️ Release inconsistency"
            echo ""
            echo "**Publishes succeeded but git push failed.** crates.io has the new versions but origin/main does not."
            echo ""
            echo "### Recovery"
            echo "From a local checkout with push permission, run:"
            echo '```sh'
            echo "git fetch origin"
            echo "git checkout main"
            echo "# Cherry-pick or fast-forward to the bump commit, then:"
            echo "git push origin main"
            echo "git push origin $TAG"
            echo '```'
            echo ""
            echo "Or re-run this workflow: the publish steps will idempotently skip and the push will retry."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
