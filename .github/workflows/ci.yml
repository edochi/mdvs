name: CI

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      # `lance-encoding`'s build.rs invokes `prost-build`, which needs `protoc`
      # on PATH. Ubuntu runners don't ship it by default.
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - run: cargo build
      # Tests run with the mock embedder enabled — hermetic, no Hugging Face
      # in CI. Real-model tests are gated behind `#[ignore]`; see TODO-0184.
      - run: cargo test --features testing-mocks
      - run: cargo clippy --all-targets --features testing-mocks -- -D warnings
      - run: cargo fmt --check

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit cargo-deny
      - run: cargo audit
      - run: cargo deny check
