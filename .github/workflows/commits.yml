name: Commits

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: git fetch --tags
      - uses: cocogitto/cocogitto-action@v4.1.0
        with:
          command: check
          args: --from-latest-tag
