[package]
name = "mdvs"
version = "0.1.0"
edition = "2021"
description = "Semantic search over directories of markdown files"

[dependencies]
anyhow = "1"
duckdb = { version = "1", features = ["bundled"] }
gray_matter = "0.2"
model2vec-rs = "*"
pulldown-cmark = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
text-splitter = { version = "0.16", features = ["markdown"] }
toml = "0.8"
walkdir = "2"
xxhash-rust = { version = "0.8", features = ["xxh3"] }
