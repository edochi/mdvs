[package]
name = "mdvs"
version = "0.1.0"
edition = "2021"
description = "A database of markdown documents — schema validation and semantic search"
license = "MIT"
repository = "https://github.com/edochi/mdvs"
readme = "README.md"
keywords = ["markdown", "search", "embeddings", "semantic", "vector"]
categories = ["command-line-utilities", "text-processing"]
exclude = ["docs/", "tests/", "scripts/", "notebooks/", ".claude/", "CLAUDE.md"]

[dependencies]
# CLI
clap = { version = "4", features = ["derive"] }

# Async (required by DataFusion)
tokio = { version = "1", features = ["full"] }

# Query engine (re-exports arrow 57 + parquet 57)
datafusion = "52"

# Error handling
anyhow = "1"

# Frontmatter
gray_matter = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1"
toml_edit = "0.22"

# Chunking + text
text-splitter = { version = "0.29", features = ["markdown"] }
pulldown-cmark = "0.13"
regex = "1"

# Embedding
model2vec-rs = "0.1.4"

# Inference (tree algorithm)
indextree = "4"

# File walking + glob + ignore
ignore = "0.4"
globset = "0.4"

# IDs + hashing
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"

# Telemetry
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-tree = "0.4"

[dev-dependencies]
tempfile = "3"
