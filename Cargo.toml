[package]
name = "mdvs"
version = "0.1.0"
edition = "2024"

[dependencies]
# CLI
clap = { version = "4", features = ["derive"] }

# Async (required by DataFusion)
tokio = { version = "1", features = ["full"] }

# Query engine (re-exports arrow 57 + parquet 57)
datafusion = "52"

# Frontmatter
gray_matter = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1"

# Chunking + text
text-splitter = { version = "0.29", features = ["markdown"] }
pulldown-cmark = "0.13"
regex = "1"

# Embedding
model2vec-rs = "0.1.4"

# Inference (tree algorithm)
indextree = "4"

# File walking + glob
walkdir = "2"
globset = "0.4"

# IDs + hashing
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
