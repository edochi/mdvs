from_latest_tag = true
ignore_merge_commits = true
branch_whitelist = []
tag_prefix = "v"

pre_bump_hooks = [
    """sed -i 's/^version = ".*"/version = "{{version}}"/' crates/mdvs/Cargo.toml""",
    "cargo generate-lockfile",
    "git add crates/mdvs/Cargo.toml Cargo.lock",
]
# post_bump_hooks intentionally empty: pushing is deferred to the release
# workflow so it only happens AFTER crates.io publishes succeed. Pushing
# inside post_bump_hooks would commit the bump (and tag) to origin even
# when publishes fail, leaving main + release workflow inconsistent with
# crates.io. See .github/workflows/bump.yml for the new order.
post_bump_hooks = []

[changelog]
path = "crates/mdvs/CHANGELOG.md"
remote = "github.com"
owner = "edochi"
repository = "mdvs"

[git_hooks.commit-msg]
script = """#!/bin/sh
set -e
cog verify --file $1
"""
