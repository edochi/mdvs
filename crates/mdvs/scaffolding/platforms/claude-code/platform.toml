# mdvs platform config — Claude Code.
#
# Read by:
#   - `mdvs scaffold skill --platform claude-code`    (install_path → help text)
#   - `mdvs scaffold snippet --platform claude-code`  (target_file + body)
#   - `mdvs scaffold hook --platform claude-code`     (substitutes hooks.config)
#   - `mdvs hook handle --platform claude-code --kind <kind>`
#                                                     (substitutes hooks.envelope)
#
# Sources:
#   skills: https://code.claude.com/docs/en/skills
#   hooks:  https://code.claude.com/docs/en/hooks

[meta]
name = "claude-code"
display_name = "Claude Code"
documentation_url = "https://code.claude.com/docs/en/hooks"

[skill]
# Claude Code reads skills only from .claude/skills/ (does not honor the
# cross-harness .agents/skills/ convention).
install_path = ".claude/skills/mdvs/SKILL.md"

[snippet]
# Claude Code reads project rules from CLAUDE.md at workspace root.
target_file = "CLAUDE.md"
body = "agents-md"

[hooks]
config_path = ".claude/settings.json"
config_format = "json"

[hooks.envelope]
# Emitted by `mdvs hook handle` after a fired hook. Placeholders:
#   <<MSG>>      — agent-context message (always populated)
#   <<USER_MSG>> — user-visible message; populated for validate, pruned
#                  for search-nudge (search-nudge stays out of the user UI).
template = """
{
  "hookSpecificOutput": {
    "hookEventName": "PostToolUse",
    "additionalContext": "<<MSG>>"
  },
  "systemMessage": "<<USER_MSG>>"
}
"""

[hooks.config]
# Emitted by `mdvs scaffold hook`. Placeholders:
#   <<COMMAND_VALIDATE>>  — full `mdvs hook handle … --kind validate` line
#   <<COMMAND_SEARCH>>    — full `mdvs hook handle … --kind search-nudge` line
template = """
{
  "hooks": {
    "PostToolUse": [
      { "matcher": "Edit|Write|MultiEdit",
        "hooks": [{ "type": "command", "command": "<<COMMAND_VALIDATE>>" }] },
      { "matcher": "Bash",
        "hooks": [{ "type": "command", "command": "<<COMMAND_SEARCH>>" }] }
    ]
  }
}
"""
