# mdvs platform config — Cursor.
#
# Read by:
#   - `mdvs scaffold skill --platform cursor`
#   - `mdvs scaffold snippet --platform cursor`
#   - `mdvs scaffold hook --platform cursor`
#   - `mdvs hook handle --platform cursor --kind <kind>`
#
# Sources:
#   skills: https://cursor.com/docs/context/skills
#   rules:  https://cursor.com/docs/rules
#   hooks:  https://cursor.com/docs/hooks

[meta]
name = "cursor"
display_name = "Cursor"
documentation_url = "https://cursor.com/docs/hooks"

[skill]
# Cursor reads from .cursor/skills/ natively, and also from .agents/skills/,
# .claude/skills/, .codex/skills/ for cross-harness compatibility. We use
# the native .cursor/skills/ as the default install path.
install_path = ".cursor/skills/mdvs/SKILL.md"

[snippet]
# Cursor honors both AGENTS.md and .cursor/rules/*.mdc. The .mdc form lets
# us set `alwaysApply: true` in frontmatter, guaranteeing the snippet is in
# every-turn context (vs AGENTS.md which is also always-on but a flatter
# convention). We use the .mdc form as the default — more idiomatic Cursor.
target_file = ".cursor/rules/mdvs.mdc"
body = "cursor-rules"

[hooks]
config_path = ".cursor/hooks.json"
config_format = "json"
# Cursor uses camelCase event names (postToolUse instead of PostToolUse).
event_name = "postToolUse"
matcher_validate = "Edit|Write|MultiEdit"
matcher_search = "Bash"
