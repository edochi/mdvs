# mdvs platform config — Codex (OpenAI Codex CLI).
#
# Sources:
#   skills:    https://developers.openai.com/codex/skills/
#   hooks:     https://developers.openai.com/codex/hooks
#   AGENTS.md: https://developers.openai.com/codex/guides/agents-md

[meta]
name = "codex"
display_name = "Codex"
documentation_url = "https://developers.openai.com/codex/hooks"

[skill]
# Codex reads from the cross-harness .agents/skills/ path.
install_path = ".agents/skills/mdvs/SKILL.md"

[snippet]
# Codex reads project rules from AGENTS.md (or AGENTS.override.md, which
# takes precedence).
target_file = "AGENTS.md"
body = "agents-md"

[hooks]
config_path = ".codex/hooks.json"
config_format = "json"

[hooks.envelope]
# Same envelope shape as Claude Code per the Codex hooks reference.
template = """
{
  "hookSpecificOutput": {
    "hookEventName": "PostToolUse",
    "additionalContext": "<<MSG>>"
  },
  "systemMessage": "<<USER_MSG>>"
}
"""

[hooks.config]
# Same hook-config shape as Claude Code, just at a different config path.
template = """
{
  "hooks": {
    "PostToolUse": [
      { "matcher": "Edit|Write|MultiEdit",
        "hooks": [{ "type": "command", "command": "<<COMMAND_VALIDATE>>" }] },
      { "matcher": "Bash",
        "hooks": [{ "type": "command", "command": "<<COMMAND_SEARCH>>" }] }
    ]
  }
}
"""
